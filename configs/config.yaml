defaults:
  - model: qwen25
  - eval: default
  - runtime: default
  - benchmark: default
  - speedup: vllm
  - _self_

run_name: vanilla
seed: 42

# Which phase to run. The two phases are kept in separate processes so vLLM
# never shares a CUDA context with HF (it cannot release one cleanly).
#   - hf:   load HF target+draft, run instrumented loop, write eval_summary.json
#           (acceptance_rate, avg_accepted_tokens, HF-side timings).
#   - vllm: skip HF model loading, run vLLM vanilla+SD passes in spawn
#           subprocesses, then merge results into the existing eval_summary.json
#           (overwrites top-level sd_time_s/vanilla_time_s/speedup/tps when SD
#           ran successfully; always populates engines.vllm).
# scripts/run_eval_pipeline.py drives both in sequence with the same run_name.
engine: hf

# Optional path (local checkpoint dir) or HF id for the draft model. If null,
# evaluation runs vanilla (target-only) inference and reports speedup=1.0.
draft: null

# Prompt source. Either a local jsonl path conforming to the data contract in
# README.md, or an HF dataset spec. Exactly one must be set.
prompts:
  jsonl: null            # e.g. data/processed/ultrachat_50k/eval.jsonl
  hf_dataset: {
    name: HuggingFaceH4/ultrachat_200k,
    split: test_sft,
    prompt_field: prompt
  }
  limit: 256               # cap number of prompts (null = all)

# Eval outputs (eval_summary.json, generations.jsonl, timing.json, config.yaml).
# Relative path under cwd. On RunAI we clone the repo under /scratch/<repo>
# and run from there, so this resolves to /scratch/<repo>/results/<run_name>
# — already inside the group scratch PVC, gitignored, and visible to TAs.
results_dir: results/${run_name}

# Where HF should cache models/datasets. notebooks/submit.sh exports
# HF_HOME=/scratch/hf_cache on the RunAI pod, so this resolves to that path
# inside the pod and to ~/.cache/huggingface elsewhere. Resolved into HF_HOME
# *before* we import transformers/huggingface_hub, so it must be set via
# Hydra config (not just os.environ at runtime).
hf_cache: ${oc.env:HF_HOME,'~/.cache/huggingface'}

# Hydra also writes its own per-job log/output directory. Keep it under cwd
# so the artefacts stay co-located with results_dir under /scratch/<repo>.
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
