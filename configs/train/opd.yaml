method: opd
draft_init: ${model.draft_default}

# OPD collection is much heavier than static KD because each train step rolls
# out the current draft and verifies proposals with the frozen target.
max_steps: 4000
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 500
eval_steps: 500
save_total_limit: 2
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
save_best_model: false
bf16: true
fp16: false
gradient_checkpointing: true
dataloader_drop_last: true
dataloader_num_workers: 0
remove_unused_columns: false
report_to_wandb: true
resume_from_checkpoint: null
overfit_samples: 0
compile_target: false

opd:
  gamma: 4
  rollout_max_new_tokens: 128
  max_seq_len: ${data.max_seq_len}
  max_prompt_tokens: null  # null => data.max_seq_len - rollout_max_new_tokens
  mode: greedy
  temperature: 1.0
  top_p: 1.0
  max_replay_examples: 1
  eos_token_id: null
