# vLLM speedup engine. Adds a second eval pass that runs vanilla and SD
# through vLLM in spawn subprocesses (vLLM cannot free CUDA state in-process).
# When this group is selected:
#   - HF custom impl still runs to capture acceptance_rate / accepted_lens.
#   - HF vanilla baseline is skipped — vanilla timing comes from vLLM.
#   - eval_summary top-level sd_time_s / vanilla_time_s / tokens_per_second /
#     speedup are sourced from vLLM; engines.{hf,vllm} preserves both.
#
# Vocab-size constraint: vLLM 0.7.3 requires draft.lm_head and target.lm_head to
# match exactly. Qwen2.5 {3B, 1.5B, 0.5B} → 151936; {7B, 14B+} → 152064.
# Pair within the same group, or set ngram=true to bypass the draft model.

engine: vllm

# vLLM engine kwargs.
# `gpu_memory_utilization` is a *fraction of total GPU memory* that vLLM
# claims for weights+activations+KV-cache. The subprocess workers clamp this
# down based on actually-free memory at startup (see `_clamp_gmu` in
# kdsd.sd.vllm_runner) — the parent's HF model is freed before spawning, but
# other processes on the GPU plus any leftover CUDA context contend for the
# same pool. 0.6 is a safe ceiling on a shared GPU; raise it on a dedicated
# one if KV-cache size is too small.
gpu_memory_utilization: 0.6
max_model_len: 4096
tensor_parallel_size: 1
enforce_eager: false
dtype: bfloat16

# n-gram (prompt-lookup) speculator: no draft model, no vocab constraint.
ngram: false
ngram_prompt_lookup_max: 4
ngram_prompt_lookup_min: 2

# vLLM-side timing knobs (independent of eval.n_warmup / eval.n_repeats, which
# govern the HF per-prompt loop). vLLM batches all prompts in a single
# llm.generate() call; `repeats` is how many such batched passes to time.
n_warmup: 1
repeats: 3
